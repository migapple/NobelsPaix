<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Prix Nobel de la Paix</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #7A6030;
    --ink: #070510;
    --ink-soft: #0E0C1A;
    --ink-mid: #1A1628;
    --text: #EDE8D8;
    --text-dim: #A09880;
    --olive: #4A6741;
    --olive-light: #6B9460;
    --dove: #8BA0B0;
  }

  html, body { height:100%; overflow:hidden; background:var(--ink); margin:0; padding:0; }

  #app {
    position:fixed; top:0; left:0; right:0; bottom:0;
    display:flex; flex-direction:column;
    background:var(--ink); overflow:hidden;
    font-family:'Crimson Pro',Georgia,serif; color:var(--text);
  }

  .header {
    padding-top: calc(14px + env(safe-area-inset-top));
    padding-bottom:0; background:var(--ink); flex-shrink:0;
    border-bottom:1px solid var(--gold-dim); position:relative; z-index:10;
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; padding:0 16px 6px; }
  .header-title { display:flex; align-items:center; gap:10px; }
  .dove-icon { font-size:24px; filter:drop-shadow(0 0 6px rgba(201,168,76,0.5)); }
  .title-text h1 { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:var(--gold); margin:0; letter-spacing:0.5px; line-height:1.1; }
  .title-text p { font-size:11px; color:var(--text-dim); margin:0; letter-spacing:1px; text-transform:uppercase; }
  .lang-btn { background:none; border:1px solid var(--gold-dim); border-radius:6px; padding:4px 8px; font-size:18px; cursor:pointer; line-height:1; }

  .tabs { display:flex; border-bottom:1px solid var(--gold-dim); background:var(--ink); }
  .tab { flex:1; background:none; border:none; padding:10px 4px; font-family:'Crimson Pro',serif; font-size:13px; color:var(--text-dim); cursor:pointer; position:relative; }
  .tab.active { color:var(--gold); }
  .tab.active::after { content:''; position:absolute; bottom:-1px; left:20%; right:20%; height:2px; background:var(--gold); border-radius:1px; }

  .main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:calc(12px + env(safe-area-inset-bottom)); }
  .section { display:none; }
  .section.active { display:block; }

  .search-bar { padding:10px 14px 6px; position:sticky; top:0; background:var(--ink); z-index:5; }
  .search-bar input { width:100%; box-sizing:border-box; background:var(--ink-mid); border:1px solid var(--gold-dim); border-radius:8px; padding:8px 12px; font-family:'Crimson Pro',serif; font-size:15px; color:var(--text); outline:none; }
  .search-bar input::placeholder { color:var(--text-dim); }

  .decade-filter { display:flex; gap:6px; padding:6px 14px 10px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .decade-filter::-webkit-scrollbar { display:none; }
  .decade-btn { background:var(--ink-mid); border:1px solid var(--gold-dim); border-radius:14px; padding:4px 10px; font-family:'Crimson Pro',serif; font-size:12px; color:var(--text-dim); white-space:nowrap; cursor:pointer; flex-shrink:0; }
  .decade-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold-light); }

  /* ── CARTE ── */
  .laureate-list { padding:0 14px; display:flex; flex-direction:column; gap:10px; }

  .laureate-card {
    background:var(--ink-soft); border:1px solid #2A2438; border-radius:10px;
    padding:12px 14px; cursor:pointer; display:flex; align-items:center; gap:12px;
    transition:border-color 0.2s;
  }
  .laureate-card:active { border-color:var(--gold-dim); background:var(--ink-mid); }

  /* Photo vignette dans la carte */
  .card-photo-wrap {
    width:48px; height:48px; border-radius:6px; overflow:hidden; flex-shrink:0;
    background:var(--ink-mid); border:1px solid var(--gold-dim);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .card-photo-wrap img {
    width:100%; height:100%; object-fit:cover; object-position:top center;
    display:none;
  }
  .card-photo-wrap img.loaded { display:block; }
  .card-photo-initials {
    font-family:'Playfair Display',serif; font-size:14px; font-weight:700;
    color:var(--gold-dim); text-align:center; line-height:1; padding:2px;
  }
  .card-year-badge {
    position:absolute; bottom:0; left:0; right:0;
    background:rgba(7,5,16,0.7); font-size:9px; font-family:'Crimson Pro',serif;
    color:var(--gold-light); text-align:center; padding:2px 0;
  }

  .card-info { flex:1; min-width:0; }
  .card-name { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--text); margin:0 0 3px; line-height:1.2; }
  .card-country { font-size:13px; color:var(--text-dim); margin:0 0 4px; }
  .card-reason { font-size:12px; color:var(--dove); margin:0; font-style:italic; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-arrow { color:var(--gold-dim); font-size:16px; flex-shrink:0; }

  /* ── DETAIL ── */
  .detail-panel {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--ink); z-index:100; flex-direction:column; overflow:hidden;
  }
  .detail-panel.open { display:flex; }
  .detail-header {
    padding:calc(14px + env(safe-area-inset-top)) 16px 12px;
    background:var(--ink); border-bottom:1px solid var(--gold-dim);
    display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .back-btn { background:none; border:1px solid var(--gold-dim); border-radius:6px; padding:5px 10px; color:var(--gold); font-size:16px; cursor:pointer; }
  .detail-header h2 { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:var(--gold); margin:0; flex:1; }
  .detail-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 0 calc(20px + env(safe-area-inset-bottom)); }

  /* Photo grande en haut de la fiche */
  .detail-photo-banner {
    display:flex; justify-content:center; padding:20px 0 4px;
    background:transparent;
  }
  .detail-photo-banner img {
    width:140px; height:auto; max-height:200px;
    object-fit:contain;
    border-radius:8px; border:2px solid var(--gold-dim);
    box-shadow:0 4px 20px rgba(0,0,0,0.6);
    display:none;
  }
  .detail-photo-banner img.loaded { display:block; }
  .detail-photo-fallback {
    width:140px; height:140px; display:flex; align-items:center; justify-content:center;
    font-size:48px; color:var(--gold-dim);
    border-radius:8px; border:2px solid var(--gold-dim);
  }

  .detail-content { padding:16px 18px; }
  .detail-year-badge { display:inline-block; background:var(--gold-dim); color:var(--gold-light); font-family:'Playfair Display',serif; font-weight:700; font-size:13px; padding:3px 10px; border-radius:12px; margin-bottom:10px; }
  .detail-name { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:var(--text); margin:0 0 4px; line-height:1.2; }
  .detail-country { font-size:16px; color:var(--text-dim); margin:0 0 18px; }
  .detail-divider { height:1px; background:linear-gradient(to right, var(--gold-dim), transparent); margin:16px 0; }
  .detail-section-title { font-family:'Playfair Display',serif; font-size:13px; font-weight:700; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin:0 0 8px; }
  .detail-reason { font-size:16px; color:var(--text); line-height:1.6; margin:0 0 16px; font-style:italic; }
  .detail-bio { font-size:15px; color:var(--text-dim); line-height:1.7; margin:0; }
  .detail-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .tag { background:var(--ink-mid); border:1px solid var(--gold-dim); border-radius:12px; padding:4px 10px; font-size:12px; color:var(--text-dim); }
  .olive-tag { background:#1A2E1A; border-color:var(--olive); color:var(--olive-light); }

  /* ── QUIZ ── */
  .quiz-container { padding:16px 14px; }
  .quiz-score-bar { background:var(--ink-mid); border:1px solid var(--gold-dim); border-radius:10px; padding:12px 16px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
  .score-label { font-size:12px; color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; }
  .score-value { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:var(--gold); }
  .quiz-card { background:var(--ink-soft); border:1px solid #2A2438; border-radius:12px; padding:18px 16px; }

  /* Photo dans le quiz */
  .quiz-photo-wrap {
    width:72px; height:72px; border-radius:8px; overflow:hidden; flex-shrink:0;
    background:var(--ink-mid); border:1px solid var(--gold-dim); float:right; margin:0 0 10px 12px;
  }
  .quiz-photo-wrap img { width:100%; height:100%; object-fit:cover; object-position:center 20%; display:none; }
  .quiz-photo-wrap img.loaded { display:block; }
  .quiz-photo-initials { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--gold-dim); }

  .quiz-q-num { font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin:0 0 10px; }
  .quiz-question { font-family:'Playfair Display',serif; font-size:17px; font-weight:400; font-style:italic; color:var(--text); line-height:1.5; margin:0 0 18px; clear:both; }
  .quiz-options { display:flex; flex-direction:column; gap:9px; }
  .quiz-option { background:var(--ink-mid); border:1px solid #2A2438; border-radius:8px; padding:12px 14px; text-align:left; font-family:'Crimson Pro',serif; font-size:15px; color:var(--text); cursor:pointer; }
  .quiz-option.correct { background:#1A2E1A; border-color:var(--olive); color:var(--olive-light); }
  .quiz-option.wrong { background:#2A1414; border-color:#7A3030; color:#C07070; }
  .quiz-feedback { margin-top:14px; padding:12px 14px; background:var(--ink-mid); border-radius:8px; font-size:14px; color:var(--text-dim); line-height:1.5; display:none; }
  .quiz-feedback.show { display:block; }
  .quiz-feedback.correct-fb { border-left:3px solid var(--olive); }
  .quiz-feedback.wrong-fb { border-left:3px solid #7A3030; }
  .quiz-next-btn { display:none; margin-top:14px; width:100%; background:var(--gold-dim); border:1px solid var(--gold); border-radius:8px; padding:12px; font-family:'Playfair Display',serif; font-size:15px; color:var(--gold-light); cursor:pointer; }
  .quiz-next-btn.show { display:block; }

  /* ── STATS ── */
  .stats-container { padding:16px 14px; display:flex; flex-direction:column; gap:14px; }
  .stat-card { background:var(--ink-soft); border:1px solid #2A2438; border-radius:10px; padding:14px 16px; }
  .stat-card-title { font-family:'Playfair Display',serif; font-size:13px; font-weight:700; color:var(--gold); letter-spacing:0.5px; margin:0 0 12px; text-transform:uppercase; }
  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #1A1628; font-size:14px; }
  .stat-row:last-child { border-bottom:none; }
  .stat-row .label { color:var(--text-dim); }
  .stat-row .value { color:var(--text); font-weight:600; }
  .stat-bar-row { display:flex; align-items:center; gap:10px; padding:5px 0; font-size:13px; }
  .stat-bar-label { color:var(--text-dim); min-width:100px; font-size:12px; }
  .stat-bar-track { flex:1; height:6px; background:var(--ink-mid); border-radius:3px; overflow:hidden; }
  .stat-bar-fill { height:100%; background:linear-gradient(to right, var(--gold-dim), var(--gold)); border-radius:3px; }
  .stat-bar-val { color:var(--gold); font-size:12px; min-width:24px; text-align:right; }

  .no-result { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:15px; font-style:italic; }
  .ornament { color:var(--gold-dim); font-size:28px; display:block; margin-bottom:10px; }

  .apps-container { padding:14px; display:flex; flex-direction:column; gap:8px; }
  .apps-section-title {

    color:var(--gold-dim); letter-spacing:1.5px; text-transform:uppercase;
    padding:10px 4px 6px; margin:0;
  }
  .app-row {
    display:flex; align-items:center; gap:12px;
    background:var(--ink-soft); border:1px solid #2A2438; border-radius:10px;
    padding:10px 12px; cursor:pointer; text-decoration:none;
  }
  .app-row:active { border-color:var(--gold-dim); background:var(--ink-mid); }
  .app-icon-wrap {
    width:52px; height:52px; border-radius:12px; overflow:hidden; flex-shrink:0;
    background:var(--ink-mid); display:flex; align-items:center; justify-content:center;
  }
  .app-icon-wrap img { width:52px; height:52px; border-radius:12px; display:none; }
  .app-icon-wrap img.loaded { display:block; }
  .app-icon-placeholder { font-size:22px; }
  .app-info { flex:1; min-width:0; }
  .app-name { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--text); margin:0 0 2px; }
  .app-cat { font-size:12px; color:var(--text-dim); margin:0; }
  .app-arrow { color:var(--gold-dim); font-size:16px; flex-shrink:0; }
</style>
</head>

        <span class="dove-icon">🕊️</span>

<script>
// ── WIKIPEDIA PHOTO (JSONP — fonctionne WKWebView + browser) ──────────────
const IMG_PREFIX = 'nobel_img_v5_';
const IMG_TTL    = 7 * 24 * 3600 * 1000;

function applyPhoto(imgEl, url) {
  // Toujours attacher onload AVANT src pour éviter le race condition WKWebView
  imgEl.onload  = () => imgEl.classList.add('loaded');
  imgEl.onerror = () => imgEl.classList.remove('loaded');
  imgEl.src = url;
  // Si l'image est déjà dans le cache browser (complete=true ET src non vide)
  if (imgEl.complete && imgEl.naturalWidth > 0) imgEl.classList.add('loaded');
}

function loadWikiPhoto(wikiTitle, imgEl, lang, directUrl) {
  if (directUrl) { applyPhoto(imgEl, directUrl); return; }
  if (!wikiTitle) return;
  const key = IMG_PREFIX + wikiTitle;
  try {
    const cached = localStorage.getItem(key);
    if (cached) {
      const { url, ts } = JSON.parse(cached);
      if (Date.now() - ts < IMG_TTL) {
        applyPhoto(imgEl, url);
        return;
      }
    }
  } catch(e) {}

  const cb = 'wkcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const script = document.createElement('script');
  let done = false;
  const cleanup = () => { clearTimeout(timer); delete window[cb]; if (script.parentNode) script.remove(); };
  const timer = setTimeout(() => { if (!done) { done=true; cleanup(); } }, 8000);

  window[cb] = (data) => {
    if (done) return;
    done = true; cleanup();
    try {
      const pages = data.query && data.query.pages;
      if (!pages) return;
      const page = Object.values(pages)[0];
      const url = page.thumbnail && page.thumbnail.source;
      if (url) {
        applyPhoto(imgEl, url);
        try { localStorage.setItem(key, JSON.stringify({ url, ts: Date.now() })); } catch(e) {}
      }
    } catch(e) {}
  };
  script.onerror = () => { if (!done) { done=true; cleanup(); } };
  const domain = lang === 'fr' ? 'fr' : 'en';
  script.src = 'https://' + domain + '.wikipedia.org/w/api.php?action=query'
             + '&titles=' + encodeURIComponent(wikiTitle)
             + '&prop=pageimages&pithumbsize=400&format=json&callback=' + cb;
  document.head.appendChild(script);
}

// wiki_en : titre article Wikipedia EN

// ── HELPER : choisir le titre wiki selon la langue ──
function getWikiTitle(d) {
  if (lang === 'fr') return d.wiki_fr || d.wiki_en;
  return d.wiki_en || d.wiki_fr;
}

// ── LANG ──
function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  document.getElementById('langBtn').textContent = lang === 'fr' ? '🇬🇧' : '🇫🇷';
  document.getElementById('appTitle').textContent = lang === 'fr' ? 'Prix Nobel de la Paix' : 'Nobel Peace Prize';
  updateTabLabels(); filterList(); renderStats();
}
function updateTabLabels() {
  if (lang==='fr') {

}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('mainScroll').scrollTop=0;
  if (name==='quiz') renderQuiz();
  if (name==='stats') renderStats();
  if (name==='apps') renderApps();
}

// ── DECADE FILTER ──
function buildDecadeFilter() {
  const decades=['all','2020','2010','2000','1990','1980','1970','1960','1950','1940','1900'];
  const L=lang==='fr'
    ?{all:'Tous','2020':'2020s','2010':'2010s','2000':'2000s','1990':'1990s','1980':'1980s','1970':'1970s','1960':'1960s','1950':'1950s','1940':'1940s','1900':'Avant 1940'}
    :{all:'All','2020':'2020s','2010':'2010s','2000':'2000s','1990':'1990s','1980':'1980s','1970':'1970s','1960':'1960s','1950':'1950s','1940':'1940s','1900':'Pre-1940'};
  document.getElementById('decadeFilter').innerHTML=decades.map(d=>`<button class="decade-btn ${d===activeDecade?'active':''}" onclick="setDecade('${d}')">${L[d]}</button>`).join('');
}
function setDecade(d) { activeDecade=d; buildDecadeFilter(); filterList(); }

// ── LISTE ──
function filterList() {
  buildDecadeFilter();
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  let items=DATA.filter(d=>{
    const ms=!q||d.name.toLowerCase().includes(q)||d.country.toLowerCase().includes(q)||d[`reason_${lang}`].toLowerCase().includes(q)||String(d.y).includes(q);
    let md=activeDecade==='all';
    if (!md){const dec=parseInt(activeDecade);md=dec===1900?d.y<1940:d.y>=dec&&d.y<dec+10;}
    return ms&&md;
  });
  const list=document.getElementById('laureateList');
  if (!items.length){list.innerHTML=`<div class="no-result"><span class="ornament">🕊️</span>${lang==='fr'?'Aucun résultat':'No results'}</div>`;return;}
  list.innerHTML=items.map(d=>{
    const initials=d.name.split(/[\s-]/)[0][0]+(d.name.split(/[\s-]/)[1]?d.name.split(/[\s-]/)[1][0]:'');
    return `<div class="laureate-card" onclick="openDetail(${d.y})">
      <div class="card-photo-wrap" id="cpw${d.y}">
        <img id="cpi${d.y}" alt="">
        <div class="card-photo-initials" id="cpini${d.y}">${initials.toUpperCase()}</div>
      </div>
      <div class="card-info">
        <p class="card-name">${d.name}</p>
        <p class="card-country">${d.flag} ${d.country}</p>
        <p class="card-reason">${d[`reason_${lang}`]}</p>
      </div>
      <span class="card-arrow">›</span>
    </div>`;
  }).join('');

  // Charger photos avec léger délai (évite surcharge réseau)
  items.forEach((d, i) => {
    const imgEl = document.getElementById('cpi'+d.y);
    const iniEl = document.getElementById('cpini'+d.y);
    if (!imgEl) return;
    imgEl.addEventListener('load',  () => { imgEl.classList.add('loaded'); if(iniEl) iniEl.style.display='none'; }, { once: true });
    imgEl.addEventListener('error', () => { imgEl.classList.remove('loaded'); }, { once: true });
    setTimeout(() => loadWikiPhoto(getWikiTitle(d), imgEl, lang==='fr'&&d.wiki_fr?'fr':'en', d.img_url||null), i * 60);
  });
}

// ── DETAIL ──
function openDetail(year) {
  const d=DATA.find(x=>x.y===year);
  if(!d) return;
  const initials=d.name.split(/[\s-]/)[0][0]+(d.name.split(/[\s-]/)[1]?d.name.split(/[\s-]/)[1][0]:'');
  document.getElementById('detailHeaderYear').textContent=`🏅 ${d.y}`;
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-photo-banner">
      <div class="detail-photo-fallback" id="dfall${d.y}">🕊️</div>
      <img id="dpi${d.y}" alt="${d.name}">
    </div>
    <div class="detail-content">
      <div class="detail-year-badge">${d.flag} ${d.y}</div>
      <h2 class="detail-name">${d.name}</h2>
      <p class="detail-country">${d.country}</p>
      <div class="detail-divider"></div>
      <p class="detail-section-title">${lang==='fr'?'Motif du prix':'Prize rationale'}</p>
      <p class="detail-reason">"${d[`reason_${lang}`]}"</p>
      <div class="detail-divider"></div>
      <p class="detail-section-title">${lang==='fr'?'Biographie':'Biography'}</p>
      <p class="detail-bio">${d[`bio_${lang}`]}</p>
      <div class="detail-tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>`;
  // Photo grande — applyPhoto gère onload/onerror, on cache le fallback via CSS
  const dpImg=document.getElementById('dpi'+d.y);
  const dpFall=document.getElementById('dfall'+d.y);
  if (dpImg && dpFall) {
    const origOnload = dpImg.onload;
    dpImg.addEventListener('load', () => { dpFall.style.display='none'; }, { once: true });
  }
  loadWikiPhoto(getWikiTitle(d), dpImg, lang==='fr'&&d.wiki_fr?'fr':'en', d.img_url||null);
  document.getElementById('detailPanel').classList.add('open');
}
function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

function startQuiz() {
  shuffledQuiz=[...QUIZ_QUESTIONS].sort(()=>Math.random()-0.5);
  quizQuestions=shuffledQuiz.slice(0,15);
  quizState={q:0,score:0,answered:false,total:quizQuestions.length};
  renderQuiz();
}

function renderQuiz() {
  if(!quizQuestions.length){startQuiz();return;}
  const c=document.getElementById('quizContainer');
  const qs=quizState;
  if(qs.q>=qs.total){
    const pct=Math.round(qs.score/qs.total*100);
    const medal=pct>=80?'🏅':pct>=50?'🕊️':'📜';
    c.innerHTML=`<div class="quiz-score-bar"><div><div class="score-label">${lang==='fr'?'Score final':'Final score'}</div></div><div class="score-value">${qs.score}/${qs.total}</div></div>
    <div class="quiz-card" style="text-align:center;padding:30px 16px">
      <div style="font-size:48px;margin-bottom:12px">${medal}</div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:8px">${pct}%</div>
      <div style="font-size:15px;color:var(--text-dim);margin-bottom:20px">${pct>=80?(lang==='fr'?'Excellent ! Vous êtes un expert.':'Excellent! You are an expert.'):pct>=50?(lang==='fr'?'Bien joué !':'Well done!'):lang==='fr'?'Continuez à apprendre.':'Keep learning.'}</div>
      <button class="quiz-next-btn show" onclick="startQuiz()">${lang==='fr'?'Recommencer le quiz':'Restart quiz'}</button>
    </div>`;
    return;
  }
  const q=quizQuestions[qs.q];
  const opts=[...q.opts].sort(()=>Math.random()-0.5);
  const safe=(s)=>s.replace(/'/g,"\\'");
  c.innerHTML=`<div class="quiz-score-bar"><div><div class="score-label">${lang==='fr'?'Question':'Question'} ${qs.q+1}/${qs.total}</div></div><div class="score-value">${qs.score} pts</div></div>
  <div class="quiz-card">
    <p class="quiz-q-num">QUESTION ${qs.q+1}</p>
    <div class="quiz-photo-wrap">
      <div class="quiz-photo-initials" id="qini">${q.wiki[0].toUpperCase()}</div>
      <img id="qphoto" alt="">
    </div>
    <p class="quiz-question">${q[`q_${lang}`]}</p>
    <div class="quiz-options">${opts.map(o=>`<button class="quiz-option" onclick="answerQuiz('${safe(o)}','${safe(q.a)}')">${o}</button>`).join('')}</div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next-btn" id="quizNextBtn" onclick="nextQuestion()">${lang==='fr'?'Question suivante →':'Next question →'}</button>
  </div>`;
  // Photo quiz
  const qImg=document.getElementById('qphoto');
  const qIni=document.getElementById('qini');
  qImg.addEventListener('load', ()=>{ qImg.classList.add('loaded'); if(qIni) qIni.style.display='none'; }, { once:true });
  loadWikiPhoto(q.wiki, qImg, q.wlang);
}

function answerQuiz(chosen,correct) {
  if(quizState.answered) return;
  quizState.answered=true;
  document.querySelectorAll('.quiz-option').forEach(btn=>{
    if(btn.textContent.trim()===correct) btn.classList.add('correct');
    else if(btn.textContent.trim()===chosen) btn.classList.add('wrong');
    btn.style.pointerEvents='none';
  });
  const isOk=chosen===correct;
  if(isOk) quizState.score++;
  const q=quizQuestions[quizState.q];
  const fb=document.getElementById('quizFeedback');
  fb.classList.add('show',isOk?'correct-fb':'wrong-fb');
  fb.innerHTML=`${isOk?'✅':'❌'} ${q[`fact_${lang}`]}`;
  document.getElementById('quizNextBtn').classList.add('show');
}

function nextQuestion() { quizState.q++; quizState.answered=false; renderQuiz(); }

let appsRendered = false;

function renderApps() {
  if (appsRendered) return;
  appsRendered = true;
  const c = document.getElementById('appsContainer');

  // Grouper par catégorie
  const groups = {};
  MY_APPS.forEach(a => {
    if (!groups[a.cat]) groups[a.cat] = [];
    groups[a.cat].push(a);
  });

  let html = '';
  Object.entries(groups).forEach(([cat, apps]) => {
    html += `<p class="apps-section-title">${cat}</p>`;
    apps.forEach(a => {
      html += `<a class="app-row" onclick="openApp('${a.id}')">
        <div class="app-icon-wrap" id="aiwrap_${a.id}">
          <span class="app-icon-placeholder" id="aiph_${a.id}">${a.emoji}</span>
          <img id="aiimg_${a.id}" alt="${a.name}">
        </div>
        <div class="app-info">
          <p class="app-name">${a.name}</p>
          <p class="app-cat">${a.cat}</p>
        </div>
        <span class="app-arrow">›</span>
      </a>`;
    });
  });
  c.innerHTML = html;

  // Charger icônes via JSONP iTunes (même pattern que panneau Settings)
  MY_APPS.forEach((a, i) => {
    setTimeout(() => loadAppIcon(a.id), i * 80);
  });
}

function loadAppIcon(numId) {
  const cb = 'itcb' + numId;
  window[cb] = function(data) {
    if (data.results && data.results[0]) {
      const url = data.results[0].artworkUrl60;
      const img = document.getElementById('aiimg_' + numId);
      const ph  = document.getElementById('aiph_'  + numId);
      if (img) {
        img.onload = () => { img.classList.add('loaded'); if(ph) ph.style.display='none'; };
        img.src = url;
        if (img.complete && img.naturalWidth > 0) { img.classList.add('loaded'); if(ph) ph.style.display='none'; }
      }
    }
    delete window[cb];
  };
  const s = document.createElement('script');
  s.src = 'https://itunes.apple.com/lookup?id=' + numId + '&callback=' + cb;
  document.body.appendChild(s);
}

function openApp(id) {
  window.open('https://apps.apple.com/app/id' + id, '_system');
}
